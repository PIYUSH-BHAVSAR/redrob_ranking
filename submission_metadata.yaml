ai_usage_summary: |
  Used Claude for architecture review, code review, and debugging.
  No candidate data was fed to any LLM. All scoring logic and
  feature engineering was implemented and validated manually.

methodology_summary: |
  Hybrid scoring system combining semantic similarity (MiniLM embeddings
  across 3 JD sections), career trajectory analysis, behavioral signals,
  and two-layer trap detection. Precomputes all embeddings offline; ranking
  step runs in pure numpy under 60 seconds on CPU. Key innovations:
  per-role max cosine aggregation to catch Tier-5 candidates,
  time-weighted product company scoring, and job-function mismatch
  detection for keyword stuffers.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
